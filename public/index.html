<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app">
    <div class="top-section">
      <h1>Expense Tracker</h1>
      <p class="subtitle">Manage your expenses with analytics</p>
    </div>

    <div class="dashboard">
      <div class="card summary-card">
        <h2>Total Expenses</h2>
        <p class="total-amount">₹<span id="totalAmount">0</span></p>
      </div>

      <div class="card summary-card">
        <h2>Total Entries</h2>
        <p class="total-amount"><span id="totalEntries">0</span></p>
      </div>
    </div>

    <div class="main-grid">
      <div class="card form-card">
        <h2 id="formHeading">Add Expense</h2>

        <div class="form-group">
          <label for="title">Expense Title</label>
          <input type="text" id="title" placeholder="Enter expense title" />
        </div>

        <div class="form-group">
          <label for="amount">Amount</label>
          <input type="number" id="amount" placeholder="Enter amount" />
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category">
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
            <option value="Health">Health</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" />
        </div>

        <div class="button-group">
          <button id="addBtn" class="primary-btn" onclick="saveExpense()">Add Expense</button>
          <button id="cancelBtn" class="secondary-btn hidden" onclick="cancelEdit()">Cancel</button>
        </div>
      </div>

      <div class="card chart-card">
        <h2>Category Analytics</h2>
        <canvas id="expenseChart"></canvas>
      </div>
    </div>

    <div class="card filter-card">
      <div class="filter-row">
        <div>
          <label for="filterCategory">Filter by Category</label>
          <select id="filterCategory" onchange="fetchExpenses()">
            <option value="All">All</option>
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
            <option value="Health">Health</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card list-card">
      <h2>Expense List</h2>
      <div id="emptyState" class="empty-state">No expenses added yet.</div>
      <div id="expenseList" class="expense-list"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
